{% load static %}
<section class="section cta-banner cta-banner--dark" id="cta-1">
    <div class="container cta-banner-inner">
        <div class="cta-banner-content">
            <h2 class="cta-banner-title">{{ site_settings.cta_1_title }}</h2>
            <p class="cta-banner-text">{{ site_settings.cta_1_text }}</p>
            <p class="cta-banner-sub">Заповніть форму та отримайте персональний розрахунок вже сьогодні.</p>
        </div>
        <div class="cta-banner-action">
            <button class="btn btn-accent btn-lg js-open-popup" data-form-location="cta-1" type="button">
                Отримати розрахунок
            </button>
        </div>
    </div>

    <!-- Wave to light section -->
    <div class="wave-sep" aria-hidden="true" style="margin-top: var(--sp-8);">
        <svg viewBox="0 0 1440 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path fill="#EEF5FF" d="M0,20 C480,56 960,0 1440,36 L1440,56 L0,56 Z"/>
        </svg>
    </div>
</section>
